<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090B" />
    <meta
      name="description"
      content="Pré-Vestibular UERJ Para Todos — plataforma de estudos com provas, questões, simulados e estatísticas."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400..900;1,400..900&family=Inter:ital,opsz,wght@0,14..32,400..800;1,14..32,400..800&display=swap"
      rel="stylesheet"
    />
    <title>UERJ Para Todos — Pré-Vestibular</title>
    <script>
      // Aplica o tema salvo ANTES do primeiro paint (evita flash).
      (function () {
        try {
          var t = localStorage.getItem("tema");
          document.documentElement.dataset.theme =
            t === "light" ? "light" : "dark";
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
